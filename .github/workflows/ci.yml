name: CI

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - renovate/*
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: Safe-Space

      - name: Checkout Doors
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: AmyJeanes/Doors
          ref: dev
          path: Doors

      - name: Checkout world-portals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: AmyJeanes/world-portals
          ref: dev
          path: world-portals

      - name: Checkout wire
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Run glua_check
        working-directory: Safe-Space
        shell: pwsh
        run: ./scripts/glua-check.ps1
