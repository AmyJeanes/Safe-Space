name: CI

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - renovate/*
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: Safe-Space

      - name: Checkout Doors
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/Doors
          ref: dev
          path: Doors

      - name: Checkout world-portals
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/world-portals
          ref: dev
          path: world-portals

      - name: Checkout wire
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.15.2
          path: gmod-addon-tools

      - name: Run glua_check
        working-directory: Safe-Space
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('Safe-Space/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: Safe-Space/results.sarif
          checkout_path: ${{ github.workspace }}/Safe-Space
          category: glua_check
